services:
  db:
    image: postgres:17
    container_name: goshrink-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-shrink-db}
    volumes:
      - postgres:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    container_name: goshrink-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
volumes:
  postgres:
  redis_data: